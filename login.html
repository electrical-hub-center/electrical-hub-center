<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body>

<h2>Customer Sign In</h2>

<input type="text" id="fname" placeholder="First Name"><br><br>
<input type="text" id="lname" placeholder="Last Name"><br><br>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="tel" id="phone" placeholder="Phone"><br><br>

<button onclick="saveData()">Sign In</button>

<script>
function login(){

var fname = document.getElementById("fname").value;
var lname = document.getElementById("lname").value;
var email = document.getElementById("email").value;
var phone = document.getElementById("phone").value;

if(fname=="" || lname==""){
alert("Enter Name");
return;
}

if(email=="" && phone==""){
alert("Enter Email or Phone");
return;
}

// ✅ Save login
localStorage.setItem("userLoggedIn","true");

// 👉 Go to dashboard
window.location.href = "dashboard.html";
}
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain: "https://electrical-hub-center.firebaseapp.com",
  projectId: "electrical-hub-center",
  appId: "1:128609071756:web:c821ff6616b4edd2c581a9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){

try {

await addDoc(collection(db, "customers"), {
  name: document.getElementById("fname").value,
  phone: document.getElementById("phone").value,
  time: new Date()
});

alert("Saved ✅");

} catch (e) {
alert("Error: " + e);
}

}

</script>

</body>
</html>
