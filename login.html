<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>

<body bgcolor="pink" text="red">

<h2><p align="center">Customer Sign In</p></h2>

<p align="center"><input type="text" id="fname" placeholder="First Name"></p><br><br>
<p align="center"<input type="text" id="lname" placeholder="Last Name"></p><br><br>

<p align="center"><input type="email" id="email" placeholder="Email"></p><br><br>
<p align="center"><input type="tel" id="phone" placeholder="Phone"></p><br><br>

<p align="center"><button onclick="saveData()">Sign In</button></p>
<script>
function login(){

var fname = document.getElementById("fname").value;
var lname = document.getElementById("lname").value;
var email = document.getElementById("email").value;
var phone = document.getElementById("phone").value;

if(fname=="" || lname==""){
alert("Enter Name");
return;
}

if(email=="" && phone==""){
alert("Enter Email or Phone");
return;
}

// ✅ Save login
localStorage.setItem("userLoggedIn","true");

// 👉 Go to dashboard
window.location.href = "dashboard.html";
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain: "https://electrical-hub-center.firebaseapp.com",
  projectId: "electrical-hub-center",
  appId: "1:128609071756:web:c821ff6616b4edd2c581a9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){

var fname = document.getElementById("fname").value;
var phone = document.getElementById("phone").value;

if(fname=="" || phone==""){
alert("Fill details");
return;
}

try {

// 🔥 Firebase save FIRST
await addDoc(collection(db, "customers"), {
  name: fname,
  phone: phone,
  time: new Date()
});

// 🔐 login save
localStorage.setItem("userLoggedIn","true");

// 🔥 THEN redirect
window.location.href = "dashboard.html";

} catch (e) {
alert("Error: " + e);
}

}

</script>

</body>
</html>
