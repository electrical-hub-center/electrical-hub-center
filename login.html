<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Electrical Hub</title>

<style>

/* 🔥 Circuit Board Background */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
  background: #0a3d62;
}

/* 🔥 Moving circuit lines */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(90deg, rgba(0,255,255,0.2) 1px, transparent 1px),
    linear-gradient(rgba(0,255,255,0.2) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveBG 10s linear infinite;
}

@keyframes moveBG {
  from { transform: translate(0,0); }
  to { transform: translate(-40px,-40px); }
}

/* 🔥 Floating icons (bulb + wire) */
.icon {
  position: absolute;
  font-size: 25px;
  opacity: 0.7;
  animation: float 6s infinite ease-in-out;
}

.icon:nth-child(1){ top: 10%; left: 20%; }
.icon:nth-child(2){ top: 70%; left: 80%; }
.icon:nth-child(3){ top: 40%; left: 10%; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* 🔥 Glass login box */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  color: white;
  width: 300px;
}

/* 🔥 Input */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* 🔥 Button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: white;
  color: #0a3d62;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0a3d62;
  color: white;
  transform: scale(1.05);
}

/* 🔥 Title */
h2 {
  margin-bottom: 15px;
}

</style>
</head>

<body>

<!-- 🔥 Floating icons -->
<div class="icon">💡</div>
<div class="icon">⚡</div>
<div class="icon">🔌</div>

<!-- 🔥 Login Box -->
<div class="container">

<h2>⚡ Sign In</h2>

<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">

<input type="email" id="email" placeholder="Email (optional)">
<input type="tel" id="phone" placeholder="Phone (optional)">

<button onclick="saveData()">Sign In</button>

</div>

<!-- 🔥 Firebase Script -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCm-lsMV-W9uNLRibsQalox13QHccgPFMc",
  authDomain: "electrical-hub-center.firebaseapp.com",
  projectId: "electrical-hub-center",
  appId: "1:128609071756:web:c821ff6616b4edd2c581a9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){

var fname = document.getElementById("fname").value;
var phone = document.getElementById("phone").value;

if(fname=="" || phone==""){
alert("Name & Phone required");
return;
}

await addDoc(collection(db, "customers"), {
  name: fname,
  phone: phone,
  time: new Date()
});

localStorage.setItem("userLoggedIn","true");

window.location.href = "dashboard.html";

}

</script>

</body>
</html>
