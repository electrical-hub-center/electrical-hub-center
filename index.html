<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Hub Center</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: Arial;

  background: linear-gradient(-45deg, #0a3d62, #3c6382, #60a3bc, #82ccdd);
  background-size: 400% 400%;
  animation: bg 8s ease infinite;
}
@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.top-text {
  position: absolute;
  top: 20px;
  text-align: center;
  color: white;
}

.container {
  text-align: center;
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top-text">
All Electrical Services ⚡ & Products 🛒 in One Place
</div>

<div class="container">
<h2>Electrical Hub Center ⚡</h2>

<button onclick="goLogin()">⚡ Sign In</button>
</div>

<script>

// 🔥 AUTO LOGIN CHECK
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

// 👉 LOGIN PAGE
function goLogin(){
  window.location.href = "login.html";
}

</script>

</body>
</html>
