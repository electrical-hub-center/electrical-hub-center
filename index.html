<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electrical Hub Center</title>

<style>

/* 🔥 Animated Background */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;

  background: linear-gradient(-45deg, #0a3d62, #3c6382, #60a3bc, #82ccdd);
  background-size: 400% 400%;
  animation: bg 8s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* 🔥 Glass Card */
.container {
  text-align: center;
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  color: white;
  width: 300px;
}

/* 🔥 Logo Image */
.logo {
  width: 80px;
  margin-bottom: 10px;
}

/* 🔥 Typing text */
#typing {
  font-size: 14px;
  margin-bottom: 20px;
  min-height: 40px;
}

/* 🔥 Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ffffff;
  color: #0a3d62;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0a3d62;
  color: white;
  transform: scale(1.1);
}

button:active {
  transform: scale(0.95);
}

</style>
</head>

<body>

<div class="container">

<!-- 🔥 Image (logo) -->
<img src="https://i.ibb.co/G4fWgcNk/Watts-To-Lumen-hero.jpg" class="logo">

<h1>⚡ Electrical Hub Center</h1>

<!-- 🔥 Auto typing text -->
<p id="typing"></p>

<button onclick="window.location.href='login.html'">
⚡ Sign In
</button>

</div>

<!-- 🔥 Typing Script -->
<script>
const text = "Welcome to Electrical Hub Center 🚀 All Electrical Services & Products in One Place";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}

typing();
</script>

</body>
</html>
