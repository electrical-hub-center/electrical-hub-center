<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Electrical Hub Center</title>

<style>
body{font-family:Arial;margin:0;background:#0f2027;color:white;}
header{text-align:center;padding:15px;background:#111;}
section{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}

.card{
background:rgba(255,255,255,0.1);
padding:10px;border-radius:10px;text-align:center;
}

button{width:100%;padding:8px;margin-top:5px;}
input,select,textarea{width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>

<header>
<h1>Electrical Hub Center</h1>
</header>

<!-- SERVICES -->
<section>
<h2>Services</h2>
<div class="grid">
<div class="card">Fan Repair ₹150</div>
<div class="card">Light Installation ₹100</div>
<div class="card">AC Service ₹500</div>
</div>
</section>

<!-- FIND TECH -->
<section>
<h2>Find Technician</h2>

<select id="location">
<option value="">Select</option>
<option>Nandigram</option>
<option>Haldia</option>
</select>

<button onclick="findTech()">Search</button>
<div id="result"></div>
</section>

<!-- BOOKING -->
<section>
<h2>Book Service</h2>

<input id="bName" placeholder="Name">
<input id="bPhone" placeholder="Phone">
<input id="bAddress" placeholder="Address">

<select id="bService">
<option>Fan Repair</option>
<option>AC Service</option>
</select>

<button onclick="bookService()">Book</button>
</section>

<!-- PRODUCTS -->
<section>
<h2>Products</h2>

<div class="grid">

<div class="card">
<h3>Fan</h3>
<p>₹1500</p>
<button onclick="openForm('Fan',1500)">Order</button>
</div>

<div class="card">
<h3>Light</h3>
<p>₹500</p>
<button onclick="openForm('Light',500)">Order</button>
</div>

</div>
</section>

<!-- ORDER POPUP -->
<div id="orderForm" style="display:none;background:#0008;position:fixed;top:0;width:100%;height:100%;">
<div style="background:white;color:black;margin:50px;padding:20px;border-radius:10px">

<h3>Confirm Order</h3>

<select id="paymentMethod">
<option value="">Select Payment</option>
<option value="COD">Cash on Delivery</option>
<option value="ONLINE">Online Payment</option>
</select>

<input id="custName" placeholder="Name">
<input id="custPhone" placeholder="Phone">
<textarea id="custAddress" placeholder="Address"></textarea>

<button onclick="placeOrder()">Confirm</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<!-- TRACK -->
<section>
<h2>Track Order</h2>
<input id="trackPhone" placeholder="Phone">
<button onclick="trackOrder()">Track</button>
<div id="trackResult"></div>
</section>

<script>
let productName="",productPrice="";

function openForm(name,price){
productName=name;
productPrice=price;
orderForm.style.display="block";
}

function closeForm(){
orderForm.style.display="none";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db=getFirestore(app);

// FIND TECH
async function findTech(){
let loc=document.getElementById("location").value;
let snap=await getDocs(collection(db,"technicians"));
let out="";
snap.forEach(doc=>{
let d=doc.data();
if(d.location && d.location.includes(loc)){
out+=`<p>${d.name} - ${d.phone}</p>`;
}
});
result.innerHTML=out||"No tech";
}

// BOOKING
async function bookService(){
await addDoc(collection(db,"bookings"),{
name:bName.value,
phone:bPhone.value,
address:bAddress.value,
service:bService.value
});
alert("Booked");
}

// MAIN ORDER
function placeOrder(){
let pay=paymentMethod.value;
if(pay==="COD")submitCOD();
else payNow();
}

// COD
async function submitCOD(){
await addDoc(collection(db,"orders"),{
name:custName.value,
phone:custPhone.value,
address:custAddress.value,
product:productName,
price:productPrice,
payment:"COD",
paymentStatus:"Pending",
deliveryStatus:"Pending"
});
alert("COD Order Done");
closeForm();
}

// ONLINE
function payNow(){
var options={
key:"rzp_test_xxx",
amount:productPrice*100,
handler:function(res){
saveOrder();
}
};
new Razorpay(options).open();
}

// SAVE ONLINE
async function saveOrder(){
await addDoc(collection(db,"orders"),{
name:custName.value,
phone:custPhone.value,
address:custAddress.value,
product:productName,
price:productPrice,
payment:"ONLINE",
paymentStatus:"Paid",
deliveryStatus:"Pending"
});
alert("Payment Done");
closeForm();
}

// TRACK
async function trackOrder(){
let phone=trackPhone.value;
let snap=await getDocs(collection(db,"orders"));
let out="";
snap.forEach(doc=>{
let d=doc.data();
if(d.phone===phone){
out+=`<p>${d.product} | ${d.paymentStatus} | ${d.deliveryStatus}</p>`;
}
});
trackResult.innerHTML=out||"No Order";
}

// FIX
window.placeOrder=placeOrder;
window.trackOrder=trackOrder;
window.openForm=openForm;
window.closeForm=closeForm;
window.findTech=findTech;
window.bookService=bookService;

</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
